name: Deploy Backend (NestJS)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/madeireira-erp/REI-API
            git reset --hard origin/main
            git pull origin main
            
            npm install
            npm run build
            
            pm2 restart rei-api || pm2 start dist/main.js --name "rei-api"
            pm2 save